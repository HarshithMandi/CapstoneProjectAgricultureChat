version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: agri-rag-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  api:
    build: .
    container_name: agri-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./chroma_db:/app/chroma_db

volumes:
  mongodb_data: